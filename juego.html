<!DOCTYPE html>
    <head>
        <meta charset="UTF-8">
        <title>FIVE NIGHTS AT SANTIAGOTARRAK'S</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body id="bodyCuerpo">

    <!-- ========================= -->
    <!-- TRANSICION -->
    <!-- ========================= -->

    <div id="nightOverlay">

        <h1 id="nightText">
            NIGHT 1
        </h1>

    </div>

    <!-- ========================= -->
    <!-- CAMARA -->
    <!-- ========================= -->

    <img
        id="cameraView"
        src="source/img/cam01.jpg"
    >

    <!-- ========================= -->
    <!-- EFECTOS -->
    <!-- ========================= -->

    <div id="cameraNoise"></div>

    <!-- ========================= -->
    <!-- HUD -->
    <!-- ========================= -->

    <div id="hudTop">

        <div id="reloj">
            12 AM
        </div>

    </div>

    <!-- ========================= -->
    <!-- BOTONES -->
    <!-- ========================= -->

    <div id="cameraPanel">

        <button class="camButton" data-cam="0">
            CAM00
        </button>
        <button class="camButton" data-cam="1">
            CAM01
        </button>

        <button class="camButton" data-cam="2">
            CAM02
        </button>

        <button class="camButton" data-cam="3">
            CAM03
        </button>

        <button class="camButton" data-cam="4">
            CAM04
        </button>

        <button class="camButton" data-cam="5">
            CAM05
        </button>

        <button class="camButton" data-cam="6">
            CAM06
        </button>

    </div>
    <audio id="camSound" src="source/audio/cambioCam.mp3" preload="auto"></audio>
    <script src="script.js"></script>

</body>

</html>
